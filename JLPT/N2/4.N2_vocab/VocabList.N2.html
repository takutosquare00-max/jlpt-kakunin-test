<html lang="ja">
<head>

<title>JLPT N2 単語 暗記帳（五十音順）</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --line:#e2e8f0; --ink:#1f2937;
    --sub:#64748b; --accent:#3b6ea5; --accent-soft:#e8f0f8;
    --kanji:#1e3a5f; --hira:#0f766e; --eng:#374151; --known:#94a3b8;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;-webkit-text-size-adjust:100%;}
  header{background:var(--accent);color:#fff;padding:16px 18px 14px;}
  header h1{margin:0;font-size:1.15rem;font-weight:700;}
  header .meta{font-size:.78rem;opacity:.9;margin-top:2px;}

  .controls{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.97);
    backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:8px 10px;}
  .toggles{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .toggles button{font-size:.78rem;padding:6px 10px;border:1px solid var(--line);
    background:#fff;border-radius:20px;cursor:pointer;color:var(--ink);white-space:nowrap;}
  .toggles button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  /* single swipeable row so the index bar stays compact on phones */
  .nav{display:flex;flex-wrap:nowrap;gap:4px;overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
  .nav::-webkit-scrollbar{display:none;}
  .nav a{flex:0 0 auto;font-size:.85rem;min-width:30px;text-align:center;padding:5px 6px;
    border:1px solid var(--line);background:#fff;border-radius:8px;text-decoration:none;
    color:var(--accent);font-weight:600;}
  .nav a:active{background:var(--accent-soft);}

  main{padding:10px 10px 60px;max-width:820px;margin:0 auto;}
  .anchor{height:0;margin:16px 0 0;padding:0;}
  .sec-head{position:sticky;top:var(--ctrlH,96px);z-index:10;display:flex;align-items:baseline;gap:8px;
    margin:0 0 6px;padding:4px 8px;background:var(--accent-soft);
    border-left:5px solid var(--accent);border-radius:4px;}
  .sec-head .kana{font-size:1.3rem;font-weight:800;color:var(--accent);}
  .sec-head .cnt{font-size:.75rem;color:var(--sub);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;margin-bottom:7px;display:grid;
    grid-template-columns:1fr 1fr;grid-template-areas:"kanji hira" "eng eng";
    gap:2px 12px;align-items:center;cursor:default;}
  .card.known{opacity:.5;background:#f8fafc;}
  .kanji{grid-area:kanji;font-size:1.15rem;font-weight:700;color:var(--kanji);}
  .kanji:empty::before{content:"—";color:var(--line);}
  .hira{grid-area:hira;font-size:1rem;color:var(--hira);font-weight:600;text-align:right;}
  .eng{grid-area:eng;font-size:.9rem;color:var(--eng);margin-top:3px;
    padding-top:5px;border-top:1px dashed var(--line);}

  /* hide modes: blur + tap to reveal */
  .hide-eng .eng .val, .hide-kanji .kanji .val, .hide-hira .hira .val{
    filter:blur(6px);cursor:pointer;user-select:none;transition:filter .12s;}
  .val.revealed{filter:none !important;cursor:default;}
  .val.blank{display:inline-block;min-width:60px;}

  .mark{grid-area:hira;justify-self:end;}
  .checkwrap{grid-area:eng;display:flex;justify-content:flex-end;margin-top:6px;}
  .checkwrap label{font-size:.72rem;color:var(--sub);display:inline-flex;align-items:center;gap:4px;cursor:pointer;}

  .toTop{position:fixed;right:14px;bottom:14px;background:var(--accent);color:#fff;
    border:none;border-radius:50%;width:44px;height:44px;font-size:1.1rem;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:30;}
  .empty{display:none;}
</style>
</head>
<body>
<header>
  <h1>JLPT N2 単語 暗記帳</h1>
  <div class="meta">五十音順・全 1818 語</div>
</header>

<div class="controls">
  <div class="toggles">
    <button id="t-eng" onclick="toggleHide('eng',this)">意味を隠す</button>
    <button id="t-kanji" onclick="toggleHide('kanji',this)">漢字を隠す</button>
    <button id="t-hira" onclick="toggleHide('hira',this)">読みを隠す</button>
    <button id="t-known" onclick="toggleKnown(this)">覚えた語を隠す</button>
    <button onclick="resetKnown()">✓解除</button>
  </div>
  <div class="nav" id="nav"></div>
</div>

<main id="main"></main>

function absTop(el){
  let y = 0;
  while(el){ y += el.offsetTop; el = el.offsetParent; }
  return y;
}
function jumpTo(kana){
  const target = document.getElementById("k_" + kana);

  const h = updateOffset();

  anchor.className="anchor"; anchor.id="k_"+g.kana;
  main.appendChild(anchor);
  const head=document.createElement("div");
  head.className="sec-head";
  head.innerHTML=`<span class="kana">${g.kana}</span><span class="cnt">${g.items.length}語</span>`;
  main.appendChild(head);
  g.items.forEach(it=>{
    const uid = g.kana + "_" + (idCounter++);
    const card=document.createElement("div");
    card.className="card";
    card.dataset.uid=uid;
    if(known[uid]) card.classList.add("known");
    const kanjiVal = it.k ? `<span class="val" onclick="reveal(this)">${esc(it.k)}</span>` : "";
    const hiraVal  = `<span class="val" onclick="reveal(this)">${esc(it.h)}</span>`;
    const engVal   = `<span class="val" onclick="reveal(this)">${esc(it.e)||"—"}</span>`;
    card.innerHTML =
      `<div class="kanji">${kanjiVal}</div>`+
      `<div class="hira">${hiraVal}</div>`+
      `<div class="eng">${engVal}`+
        `<span class="checkwrap"><label><input type="checkbox" ${known[uid]?"checked":""} `+
        `onchange="setKnown('${uid}',this.checked)">覚えた</label></span>`+
      `</div>`;
    main.appendChild(card);
  });
});

function reveal(el){
  if(document.body.className.match(/hide-/)) el.classList.add("revealed");
}
function toggleHide(kind,btn){
  document.body.classList.toggle("hide-"+kind);
  btn.classList.toggle("on");
  // reset revealed state when re-hiding
  document.querySelectorAll(".val.revealed").forEach(v=>{
    // only clear those under a still-hidden column? simplest: clear all
  });
  if(!document.body.classList.contains("hide-"+kind)){
    // when unhiding, clear reveals so they can be re-hidden cleanly later
  }
  document.querySelectorAll(".val.revealed").forEach(v=>v.classList.remove("revealed"));
}
function setKnown(uid,val){
  const card=document.querySelector(`.card[data-uid="${uid}"]`);
  if(val){ known[uid]=1; card.classList.add("known"); }
  else { delete known[uid]; card.classList.remove("known"); }
  localStorage.setItem(LS_KEY, JSON.stringify(known));
  applyKnownFilter();
}
let hideKnown=false;
function toggleKnown(btn){
  hideKnown=!hideKnown; btn.classList.toggle("on"); applyKnownFilter();
}
function applyKnownFilter(){
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = (hideKnown && c.classList.contains("known")) ? "none" : "";
  });
}
function resetKnown(){
  if(!confirm("「覚えた」チェックをすべて解除しますか？")) return;
  known={}; localStorage.removeItem(LS_KEY);
  document.querySelectorAll(".card").forEach(c=>{
    c.classList.remove("known");
    const cb=c.querySelector("input[type=checkbox]"); if(cb) cb.checked=false;
  });
  applyKnownFilter();
}

// init: measure controls height now and whenever it changes size
updateOffset();
window.addEventListener("load", updateOffset);
window.addEventListener("resize", updateOffset);
if(window.ResizeObserver){ new ResizeObserver(updateOffset).observe(controlsEl); }
</script>
